version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: elderos
      POSTGRES_USER: elderos
      POSTGRES_PASSWORD: elderos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elderos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://elderos:elderos@postgres:5432/elderos
      SECRET_KEY: dev-secret-key-change-in-production-64chars-minimum-for-security
      CORS_ORIGINS: '["http://localhost:3000"]'
      EDGE_API_KEY: edge-device-shared-secret
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts

  edge-simulator:
    build: ./edge
    environment:
      BACKEND_URL: http://backend:8000
      BACKEND_API_KEY: edge-device-shared-secret
      MODE: simulator
      CONFIG_DIR: /app/config
    depends_on:
      - backend
    volumes:
      - clip-data:/data/clips

volumes:
  pgdata:
  clip-data:
